name: Cleanup Container Images

# Prune the GHCR package so per-commit (:sha-) builds and orphaned manifests
# don't accumulate forever.
#
# IMPORTANT - why this no longer uses actions/delete-package-versions:
# Our release images are OCI indexes built with buildx attestations
# (provenance + SBOM). GHCR stores an index's platform child + attestation
# (referrer) manifests as SEPARATE, UNTAGGED package versions - the tags
# (latest, edge, semver) live only on the parent index. The old
# `delete-only-untagged-versions: true` step therefore deleted those children
# and left every tag dangling -> `manifest unknown` on pull (broke v0.9.2).
#
# dataaxiom/ghcr-cleanup-action understands the manifest tree: it preserves the
# children + referrer manifests of any image it keeps, so tagged indexes stay
# pullable.
on:
  schedule:
    # Weekly, Sundays at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch: {}

jobs:
  cleanup:
    name: Prune old image versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prune GHCR images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: fukuflow

          # Only per-commit (:sha-<short>) builds are eligible for tag deletion,
          # and only once they're older than 4 weeks. Release/floating tags are
          # never `sha-*`, so they are inherently out of scope - we deliberately
          # avoid `keep-n-tagged`, which scans ALL tags and could age out an old
          # semver release.
          delete-tags: 'sha-*'
          older-than: '4 weeks'

          # Belt-and-suspenders: never touch the floating channels.
          exclude-tags: 'latest,edge'

          # Remove genuinely-orphaned manifests left behind when a tag moves.
          # The action keeps the children/attestations of images it retains.
          delete-untagged: true
          delete-orphaned-images: true

          # Warn (informational) if any multi-arch image is left incomplete.
          validate: true

          # SAFETY - starts in dry-run so nothing is deleted yet. Trigger this
          # workflow once via "Run workflow", confirm the log only stages old
          # :sha-* tags and true orphans (NOT release tags or their platform /
          # attestation children), then set this to false to enable pruning.
          dry-run: true
